name: momfriend
description: MomFriend - Bezpieczna platforma łącząca mamy w celu nawiązywania przyjaźni
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management - Clean Architecture
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Network & Data - Professional setup
  dio: ^5.3.2
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  connectivity_plus: ^5.0.2

  # UI & Design - Mom-friendly
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.6.0
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^6.1.0

  # Navigation - Modern approach
  go_router: ^12.1.3
  
  # Geolocation & Maps - Enhanced
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_maps_flutter: ^2.5.0

  # Functional Programming
  dartz: ^0.10.1

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image & Media - Enhanced
  image_picker: ^1.0.4
  photo_view: ^0.14.0
  permission_handler: ^11.1.0

  # Card Swiper - Enhanced for moms
  flutter_card_swiper: ^6.0.0

  # Utils
  intl: ^0.18.1
  uuid: ^4.1.0
  path_provider: ^2.1.1
  url_launcher: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

  # Testing - Professional
  bloc_test: ^9.1.5
  mockito: ^5.4.2
  mocktail: ^1.0.1

  # Linting
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700 