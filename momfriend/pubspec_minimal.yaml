name: momfriend
description: MomFriend - Bezpieczna platforma łącząca mamy w celu nawiązywania przyjaźni
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  lottie: ^2.6.0
  flutter_card_swiper: ^6.0.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.2
  json_annotation: ^4.8.1
  retrofit: ^4.0.3

  # Storage & Caching
  shared_preferences: ^2.2.2

  # Location & Maps (basic versions)
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Image & Media
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0

  # Utils
  intl: ^0.18.1
  uuid: ^4.1.0
  path_provider: ^2.1.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700 